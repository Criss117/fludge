# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Bun 1.3.14 + TypeScript 6 monorepo (Turborepo 2.8.12)
  Frontend: React 19, TanStack Router, Vite 8, Tailwind CSS v4 (web) / Expo 56, Uniwind, HeroUI Native (mobile)
  Backend: Elysia 1.4.28 (Bun), oRPC 1.13.14, Zod 4.1.13
  Database: PostgreSQL via Drizzle ORM 0.45
  Auth: Better-Auth 1.6.11
  Architecture: Modular monolith with DDD/CQRS (backend), feature-based modules (web),
                Expo Router (mobile), domain events, manual DI containers
  Created via: Better-T-Stack v3.30.3

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns (DDD/CQRS for api, modules for web)
    tdd: false
    test_command: "bun test"
  verify:
    test_command: ""
    build_command: "bun run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: false
  reason: "No test runner installed (no vitest/jest config found). Bun built-in test runner available globally but not configured. Install vitest or configure bun test before enabling strict TDD."
  framework: null
  runner: null
  coverage: false
  coverage_command: null
  layers:
    unit: false
    integration: false
    e2e: false
  linter: false
  linter_command: null
  type_checker: true
  type_checker_command: "bun run check-types"
  formatter: false
  formatter_command: null
